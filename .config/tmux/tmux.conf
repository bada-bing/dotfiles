# --- SETTINGS --- 
# turn off all the bell sounds
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

set -g default-terminal "xterm-256color" # set the terminal type, required to use delete keys on Mac
set -g base-index 1  # start counting windows and panels from 1 
set-window-option -g pane-base-index 1
set -g renumber-windows on

# mouse mode on
set -g mouse on
set -ga terminal-overrides ',*256color*:smcup@:rmcup@'
set -sg escape-time 10

# --- KEYBINDINGS --- 
# bind is alias for bind-key

# remap LEADER key from 'Ctrl-b' to 'Ctrl-t'
unbind C-b
set-option -g prefix C-t

# WINDOW MANAGEMENT
bind | split-window -h -c '#{pane_current_path}' # split panes horizontally with  -
bind - split-window -v -c '#{pane_current_path}' # split panes vertically with | 
unbind '"'
unbind %

# Copy Mode - Vim style pane selection
setw -g mode-keys vi # set window global copy mode to vi-style
# use / to search, space to start and enter to complete selection
bind-key / copy-mode \; send-key ?

bind S-Left resize-pane -L 4
bind S-Right resize-pane -R 4
bind S-Down resize-pane -D 4
bind S-Up resize-pane -U 4

bind c new-window -c '#{pane_current_path}'
bind b break-pane -d # move pane to separate window

# Easier and faster switching between next/prev window
bind -n C-Left previous-window
bind -n C-Right next-window

bind l switch-client -l # switch to the last session

bind r source-file $HOME/.config/tmux/tmux.conf \; display-message "~/.tmux.conf reloaded"

# SESSION MANAGEMENT
bind a run-shell "tmux neww $HOME/src/scripts/local_development/tmux_sessionizer.sh"

# FIXME lazygit opens incorrect directory (the initial dir not the current dir)
# bind h split-window -h "lazygit" # TODO load it in a pop-up window
bind t split-window -h -c ~/ "nvim ~/.config/tmux/tmux.conf"

# you can use this keybindings for popup, so single key can open or close popup with ease
bind -n M-g if-shell -F '#{==:#{session_name},scratch}' {
    detach-client
} {
    display-popup -E "tmux new-session -A -s scratch"
    # you can use similar pop-up to switch workspace
    # bind C-g display-popup -E "ta ~/git"
}

# STATUSBAR
# xterm colors    : https://jonasjacek.github.io/colors/
# strftime format : https://devhints.io/datetime
set -g status-position top
set -g status-justify centre

# set -g status-style 'bg=colour235 fg=colour255' # Fallback only; I use tokyo-night theme

# --- TOKYO NIGHT THEME ---
# Uncomment and set to change theme variant: night (default), storm, or moon
# set-environment -g TOKYO_NIGHT_VARIANT "storm"
# set-option -g @tokyo-night-variant

# Status bar mode indicators
TMUX_MODE_PREFIX_FG="#292e42"
TMUX_MODE_PREFIX_BG="#7dcfff"
TMUX_MODE_COPY_BG="#bb9af7"

# set -g status-left "#{?client_prefix,#[bg=colour88]TMUX,#[bg=colour214]📟} #[fg=colour0] #S " # https://superuser.com/questions/429577/how-to-show-current-mode-in-status-line-in-tmux
set -g status-left "#{?client_prefix,#[bg=$TMUX_MODE_PREFIX_BG fg=$TMUX_MODE_PREFIX_FG]TMUX ,#{?pane_in_mode,#[bg=$TMUX_MODE_COPY_BG fg=$TMUX_MODE_PREFIX_FG]COPY ,#(~/src/scripts/tmux/tmux_session_color.sh '#S')}} "
set -g status-left-length 50

#set -g status-right "#[bg=colour235,fg=colour255] %a, %b %e [#h]"
set -g status-right "#(~/src/scripts/tmux/tmux_session_color.sh '#S' right) %a, %b %e [#h] "
set -g status-right-length 300

# Source Tokyo Night theme
run-shell ~/.config/tmux/tokyo-night.tmux

# tmux-fingers (Prefix - F to enter fingers mode)
run-shell ~/.tmux/plugins/tmux-fingers/tmux-fingers.tmux